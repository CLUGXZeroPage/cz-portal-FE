name: Deploy Vue App to EC2

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Node.js 환경 설정 (필요한 Node 버전을 지정)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. 의존성 설치
      - name: Install Dependencies
        run: npm install

      # 4. Vue 앱 빌드 (빌드 결과물이 dist 폴더에 생성됨)
      - name: Build Vue App
        run: npm run build

      # 5. 배포 전, EC2의 대상 디렉토리 기존 내용 삭제
      - name: Clear target directory on EC2
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            sudo rm -rf /var/www/vue-app/*

      # 6. 빌드 결과물(파일들)만 EC2 서버로 전송 (appleboy/scp-action 사용)
      - name: Deploy Vue App via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "dist/*"       # dist 폴더 안의 내용물만 복사
          target: "/var/www/vue-app/"

      # 7. 원격 서버에서 추가 작업 실행 (예: 권한 변경, Nginx 재시작 등)
      - name: Post Deployment - Set Permissions and Restart Nginx
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            sudo chown -R www-data:www-data /var/www/vue-app
            sudo systemctl restart nginx

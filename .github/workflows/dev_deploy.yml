name: Deploy Vue App to EC2

on:
  push:
    branches:
      - main   # 또는 develop 등 원하는 브랜치 지정

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 코드 체크아웃
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Node.js 환경 설정 (필요한 Node 버전을 지정)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      # 3. 의존성 설치
      - name: Install Dependencies
        run: npm install

      # 4. Vue 앱 빌드 (빌드 결과물이 dist 폴더에 생성됨)
      - name: Build Vue App
        run: npm run build

      # 5. 빌드 결과물을 EC2 서버로 전송 (appleboy/scp-action 사용)
      - name: Deploy Vue App via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}       # EC2 IP 또는 도메인
          username: ${{ secrets.EC2_USER }}     # EC2 접속 사용자 (예: ubuntu, ec2-user 등)
          key: ${{ secrets.SSH_KEY }}           # GitHub Secrets에 저장된 SSH 개인 키
          port: 22
          source: "dist/*"                      # 빌드 결과물 경로
          target: "/var/www/vue-app/"           # EC2 배포 대상 경로

      # 6. 원격 서버에서 추가 작업 실행 (예: 권한 변경, Nginx 재시작 등)
      - name: Post Deployment: Set Permissions and Restart Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            sudo chown -R www-data:www-data /var/www/vue-app
            sudo systemctl restart nginx
